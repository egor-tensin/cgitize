version: 2
updates:
  - package-ecosystem: docker
    directories:
      - '**/*'
    schedule:
      interval: weekly
  - package-ecosystem: docker-compose
    directories:
      - '**/*'
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
  # No pip, because it's automated in the maintenance workflow anyway.
